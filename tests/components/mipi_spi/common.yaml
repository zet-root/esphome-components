display:
  - platform: mipi_spi
    spi_16: true
    pixel_mode: 18bit
    model: ili9488
    dc_pin:
      allow_other_uses: true
      number: ${dc_pin}
    cs_pin:
      allow_other_uses: true
      number: ${cs_pin}
    reset_pin:
      allow_other_uses: true
      number: ${reset_pin}
    data_rate: 20MHz
    invert_colors: true
    show_test_card: true
    spi_mode: mode0
    draw_rounding: 4
    use_axis_flips: true
    init_sequence:
      - [0xd0, 1, 2, 3]
      - delay 10ms
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    dimensions:
      width: 100
      height: 200
    enable_pin: ${enable_pin}
    bus_mode: single

  - platform: mipi_spi
    model: WAVESHARE-1.83-V2
    dc_pin:
      allow_other_uses: true
      number: ${dc_pin}
    cs_pin:
      allow_other_uses: true
      number: ${cs_pin}
    reset_pin:
      allow_other_uses: true
      number: ${reset_pin}
