ufm01:
  id: ufm01_component
  uart_id: uart_bus

sensor:
  - platform: ufm01
    accumulated_flow:
      id: accumulated_flow
      name: "Accumulated flow"
    flow:
      id: flow
      name: "Flow"
    temperature:
      id: temperature
      name: "Temperature"

binary_sensor:
  - platform: ufm01
    ufc_chip_error:
      id: ufc_chip_error
      name: "UFC chip error"
    flow_direction_wrong:
      id: flow_direction_wrong
      name: "Flow direction wrong"
    empty_tube:
      id: empty_tube
      name: "Empty tube"
    flow_rate_out_of_range:
      id: flow_rate_out_of_range
      name: "Flow rate out of range"
