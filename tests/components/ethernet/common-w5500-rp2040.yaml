ethernet:
  type: W5500
  clk_pin: 18
  mosi_pin: 19
  miso_pin: 16
  cs_pin: 17
  interrupt_pin: 21
  reset_pin: 20
  manual_ip:
    static_ip: 192.168.178.56
    gateway: 192.168.178.1
    subnet: 255.255.255.0
  domain: .local
  mac_address: "02:AA:BB:CC:DD:01"
  on_connect:
    - logger.log: "Ethernet connected!"
  on_disconnect:
    - logger.log: "Ethernet disconnected!"
