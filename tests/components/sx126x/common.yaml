sx126x:
  dio1_pin: ${dio1_pin}
  cs_pin: ${cs_pin}
  busy_pin: ${busy_pin}
  rst_pin: ${rst_pin}
  pa_power: 3
  bandwidth: 125_0kHz
  crc_enable: true
  crc_initial: 0x1D0F
  crc_polynomial: 0x1021
  crc_size: 2
  crc_inverted: true
  frequency: 433920000
  modulation: LORA
  rx_start: true
  hw_version: sx1262
  rf_switch: true
  sync_value: [0x14, 0x24]
  preamble_size: 8
  spreading_factor: 7
  coding_rate: CR_4_6
  tcxo_voltage: 1_8V
  tcxo_delay: 5ms
  on_packet:
    then:
      - lambda: |-
          ESP_LOGD("lambda", "packet %.2f %.2f %s", rssi, snr, format_hex(x).c_str());

number:
  - platform: template
    name: "SX126x Number"
    id: sx126x_my_number
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1

button:
  - platform: template
    name: "SX126x Button"
    on_press:
      then:
        - sx126x.set_mode_standby
        - sx126x.run_image_cal
        - sx126x.set_mode_sleep
        - sx126x.set_mode_rx
        - sx126x.send_packet:
            data: [0xC5, 0x51, 0x78, 0x82, 0xB7, 0xF9, 0x9C, 0x5C]
        - sx126x.send_packet: !lambda |-
            return {0x01, 0x02, (uint8_t)id(sx126x_my_number).state};
