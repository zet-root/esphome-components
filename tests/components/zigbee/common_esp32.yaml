packages:
  - !include common.yaml

binary_sensor:
  - platform: template
    name: "Garage Door Open 10"
    report: "enable"
  - platform: template
    name: "Garage Door Open 12"
    report: "force"

zigbee:
  model: zigbee_test
  router: true
  power_source: MAINS_SINGLE_PHASE
  on_join:
    then:
      - logger.log: "Joined network"
