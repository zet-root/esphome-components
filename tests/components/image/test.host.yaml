display:
  - platform: sdl
    id: image_display
    auto_clear_enabled: false
    dimensions:
      width: 480
      height: 480

image:
  - platform: file
    id: binary_image
    file: ../../pnglogo.png
    type: binary
    dither: FloydSteinberg
  - platform: file
    id: transparent_transparent_image
    file: ../../pnglogo.png
    type: binary
    transparency: chroma_key
  - platform: file
    id: rgba_image
    file: ../../pnglogo.png
    type: rgb
    transparency: alpha_channel
    resize: 50x50
  - platform: file
    id: rgb24_image
    file: ../../pnglogo.png
    type: RGB
    transparency: chroma_key
  - platform: file
    id: rgb_image
    file: ../../pnglogo.png
    type: rgb
    transparency: opaque
  - platform: file
    id: rgb565_image
    file: ../../pnglogo.png
    type: rgb565
    transparency: opaque
  - platform: file
    id: rgb565_ck_image
    file: ../../pnglogo.png
    type: rgb565
    transparency: chroma_key
  - platform: file
    id: rgb565_alpha_image
    file: ../../pnglogo.png
    type: rgb565
    transparency: alpha_channel
  - platform: file
    id: grayscale_alpha_image
    file: ../../pnglogo.png
    type: grayscale
    transparency: alpha_channel
    resize: 50x50
  - platform: file
    id: grayscale_ck_image
    file: ../../pnglogo.png
    type: grayscale
    transparency: chroma_key
  - platform: file
    id: grayscale_image
    file: ../../pnglogo.png
    type: grayscale
    transparency: opaque
