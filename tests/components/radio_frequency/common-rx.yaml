remote_receiver:
  id: rf_receiver
  pin: ${rx_pin}

# Test radio_frequency platform with receiver
radio_frequency:
  # RF 900MHz receiver
  - platform: ir_rf_proxy
    id: rf_900_rx
    name: "RF 900 Receiver"
    frequency: 900 MHz
    remote_receiver_id: rf_receiver

  # RF receiver (no frequency specified)
  - platform: ir_rf_proxy
    id: rf_rx
    name: "RF Receiver"
    remote_receiver_id: rf_receiver
