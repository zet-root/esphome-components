image:
  grayscale:
    alpha_channel:
      - file: ../../pnglogo.png
        id: image_1
        resize: 50x50
      - file: ../../pnglogo.png
        id: image_2
        resize: 50x50

mapping:
  - id: weather_map
    from: string
    to: "image::Image"
    entries:
      clear-night: image_1
      sunny: image_2
  - id: weather_map_1
    from: string
    to: esphome::image::Image
    entries:
      clear-night: image_1
      sunny: image_2
    default_value: image_1
  - id: weather_map_2
    from: string
    to: image
    entries:
      clear-night: image_1
      sunny: image_2
  - id: int_map
    from: int
    to: string
    entries:
      1: "one"
      2: "two"
      3: "three"
      77: "seventy-seven"
    default_value: unknown
  - id: string_map
    from: string
    to: int
    entries:
      one: 1
      two: 2
      three: 3
      seventy-seven: 77
  - id: color_map
    from: string
    to: color
    entries:
      red: red_id
      blue: blue_id
      green: green_id
  - id: string_map_2
    from: string
    to: string
    entries:
      one: "one"
      two: "two"
      three: "three"
      seventy-seven: "seventy-seven"

color:
  - id: red_id
    red: 1.0
    green: 0.0
    blue: 0.0
  - id: green_id
    red: 0.0
    green: 1.0
    blue: 0.0
  - id: blue_id
    red: 0.0
    green: 0.0
    blue: 1.0

font:
  - file: "$component_dir/helvetica.ttf"
    id: font_id
    size: 20

display:
  lambda: |-
      std::string value = id(int_map)[2];
      it.print(0, 0, id(font_id), TextAlign::TOP_LEFT, value.c_str());
      it.image(0, 0, id(weather_map)["clear-night"]);
      it.image(0, 100, id(weather_map)["sunny"]);
