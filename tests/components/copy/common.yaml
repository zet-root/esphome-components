output:
  - platform: ${pwm_platform}
    id: copy_fan_output_1
    pin: ${pin}

fan:
  - platform: speed
    id: copy_fan_speed
    output: copy_fan_output_1
    preset_modes:
      - Eco
      - Turbo
  - platform: copy
    source_id: copy_fan_speed
    name: Fan Speed Copy

select:
  - platform: template
    id: test_select
    options:
      - one
      - two
    optimistic: true
  - platform: copy
    source_id: test_select
    name: Test Select Copy
