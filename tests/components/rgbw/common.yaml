output:
  - platform: ${light_platform}
    id: rgbw_light_output_1
    pin: ${pin1}
  - platform: ${light_platform}
    id: rgbw_light_output_2
    pin: ${pin2}
  - platform: ${light_platform}
    id: light_output_3
    pin: ${pin3}
  - platform: ${light_platform}
    id: light_output_4
    pin: ${pin4}

light:
  - platform: rgbw
    name: RGBW Light
    red: rgbw_light_output_1
    green: rgbw_light_output_2
    blue: light_output_3
    white: light_output_4
    color_interlock: true
