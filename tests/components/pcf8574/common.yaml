pcf8574:
  - id: pcf8574_hub
    i2c_id: i2c_bus
    address: 0x21
    pcf8575: false
  - id: pcf8574_hub_int
    i2c_id: i2c_bus
    address: 0x22
    pcf8575: false
    interrupt_pin: ${interrupt_pin}

binary_sensor:
  - platform: gpio
    id: pcf8574_binary_sensor
    name: PCF Binary Sensor
    pin:
      pcf8574: pcf8574_hub
      number: 1
      mode: INPUT
      inverted: true

output:
  - platform: gpio
    id: pcf8574_output
    pin:
      pcf8574: pcf8574_hub
      number: 0
      mode: OUTPUT
      inverted: false
