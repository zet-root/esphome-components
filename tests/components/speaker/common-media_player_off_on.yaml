<<: !include common.yaml

media_player:
  - platform: speaker
    id: speaker_media_player_id
    announcement_pipeline:
      speaker: speaker_id
    buffer_size: 1000000
    volume_increment: 0.02
    volume_max: 0.95
    volume_min: 0.0
    task_stack_in_psram: true
    on_turn_on:
      then:
        - logger.log: "Turn On Media Player"
    on_turn_off:
      then:
        - logger.log: "Turn Off Media Player"
