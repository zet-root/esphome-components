sensor:
  - platform: template
    id: some_sensor

graph:
  - id: some_graph
    sensor: some_sensor
    duration: 1h
    width: 100
    height: 100

display:
  - platform: ssd1306_i2c
    i2c_id: i2c_bus
    id: graph_ssd1306_display
    model: SSD1306_128X64
    reset_pin: ${reset_pin}
    pages:
      - id: graph_page1
        lambda: |-
          it.rectangle(0, 0, it.get_width(), it.get_height());
