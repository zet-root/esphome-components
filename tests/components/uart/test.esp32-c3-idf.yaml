esphome:
  on_boot:
    then:
      - uart.write:
          id: uart_id
          data: 'Hello World'
      - uart.write:
          id: uart_id
          data: [0x00, 0x20, 0x42]

uart:
  - id: uart_id
    tx_pin: 4
    rx_pin: 5
    flow_control_pin: 6
    baud_rate: 9600
    data_bits: 8
    rx_buffer_size: 512
    rx_full_threshold: 10
    rx_timeout: 1
    parity: EVEN
    stop_bits: 2
  - id: uart_debug
    tx_pin: 18
    rx_pin: 19
    baud_rate: 115200
    debug:
      debug_prefix: "[UART1] "
