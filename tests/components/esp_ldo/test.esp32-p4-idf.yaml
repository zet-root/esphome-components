esp_ldo:
  - id: ldo_id
    channel: 3
    voltage: 2.5V
    adjustable: true
  - id: ldo_4_passthrough
    channel: 4
    voltage: passthrough
  - id: ldo_1_internal
    channel: 1
    voltage: 1.8V
    allow_internal_channel: true

esphome:
  on_boot:
    then:
      - esp_ldo.voltage.adjust:
          id: ldo_id
          voltage: !lambda return 2.5;
