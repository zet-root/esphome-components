binary_sensor:
  - platform: template
    id: endstop_bin1
    lambda: |-
      if (millis() > 10000) {
        return true;
      }
      return false;

switch:
  - platform: template
    id: endstop_template_switch1
    optimistic: true
  - platform: template
    id: template_switch2
    optimistic: true

cover:
  - platform: endstop
    id: endstop_cover
    name: Endstop Cover
    stop_action:
      - switch.turn_on: endstop_template_switch1
    open_endstop: endstop_bin1
    open_action:
      - switch.turn_on: endstop_template_switch1
    open_duration: 5min
    close_endstop: endstop_bin1
    close_action:
      - switch.turn_on: template_switch2
    close_duration: 4.5min
    max_duration: 10min
