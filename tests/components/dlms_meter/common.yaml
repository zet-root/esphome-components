  skip_crc: true
  provider: "netznoe"
  custom_patterns:
    - "custom_pattern_1"
    - "custom_pattern_2"

sensor:
  # Old Schema tests
  - platform: dlms_meter
    voltage_l1:
      name: "Voltage L1"
    voltage_l2:
      name: "Voltage L2"
    voltage_l3:
      name: "Voltage L3"
    current_l1:
      name: "Current L1"
    current_l2:
      name: "Current L2"
    current_l3:
      name: "Current L3"
    active_power_plus:
      name: "Active power taken from grid"
    active_power_minus:
      name: "Active power put into grid"
    active_energy_plus:
      name: "Active energy taken from grid"
    active_energy_minus:
      name: "Active energy put into grid"
    reactive_energy_plus:
      name: "Reactive energy taken from grid"
    reactive_energy_minus:
      name: "Reactive energy put into grid"
    power_factor:
      name: "Power factor"

  # Dynamic Schema tests
  - platform: dlms_meter
    dlms_meter_id: dlms_meter_hub
    obis_code: "1-0:99.99.9"
    name: "Custom Dynamic Sensor"

text_sensor:
  # Old Schema tests
  - platform: dlms_meter
    timestamp:
      name: "timestamp"
    meternumber:
      name: "Meter Number"

  # Dynamic Schema tests
  - platform: dlms_meter
    dlms_meter_id: dlms_meter_hub
    obis_code: "0-0:99.99.9"
