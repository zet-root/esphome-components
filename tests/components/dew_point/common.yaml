sensor:
  - platform: dew_point
    name: Dew Point
    temperature: template_temperature
    humidity: template_humidity
  - platform: template
    id: template_humidity
    lambda: |-
      if (millis() > 10000) {
        return 0.6;
      }
      return 0.0;
  - platform: template
    id: template_temperature
    lambda: |-
      if (millis() > 10000) {
        return 42.0;
      }
      return 0.0;
