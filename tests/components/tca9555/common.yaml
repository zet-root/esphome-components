tca9555:
  - id: tca9555_hub
    i2c_id: i2c_bus
    address: 0x21
  - id: tca9555_hub_int
    i2c_id: i2c_bus
    address: 0x22
    interrupt_pin: ${interrupt_pin}

binary_sensor:
  - platform: gpio
    id: tca9555_binary_sensor
    name: TCA9555 Binary Sensor
    pin:
      tca9555: tca9555_hub
      number: 1
      mode: INPUT
      inverted: true

output:
  - platform: gpio
    id: tca9555_output
    pin:
      tca9555: tca9555_hub
      number: 0
      mode: OUTPUT
      inverted: false
