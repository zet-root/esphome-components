sensor:
  - platform: spa06_spi
    spi_id: spi_bus
    cs_pin: ${cs_pin}
    temperature:
      id: spa06_spi_temperature
      name: Outside Temperature
      sample_rate: 1
      oversampling: NONE
    pressure:
      name: Outside Pressure
      id: spa06_spi_pressure
      sample_rate: 25p4
      oversampling: 16X
    update_interval: 15s
